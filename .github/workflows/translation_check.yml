name: 翻译键值检查（发布版本前必须运行）

on:
  workflow_dispatch:

jobs:
  merge-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Merge and Check JSON Data
        env:
          AUTHORIZATION: ${{ secrets.AUTHORIZATION }}
        run: |
          python scripts/merge_and_check.py

      - name: Publish check summary
        if: always()
        shell: bash
        run: |
          if [[ -f reports/translation-check/report.md ]]; then
            cat reports/translation-check/report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload translation check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: translation-check-report
          path: reports/translation-check/
          if-no-files-found: warn

      - name: Evaluate Check Result
        shell: bash
        run: |
          report=reports/translation-check/report.json
          if [[ ! -f "$report" ]]; then
            echo "检查报告未生成。" >&2
            exit 1
          fi

          issue_count=$(jq -r '.summary.total_issues' "$report")
          if [[ "$issue_count" -eq 0 ]]; then
            echo "检查成功，无不一致项。"
          else
            echo "发现 $issue_count 个不一致项，检查失败。"
            exit 1
          fi
