name: 对比ini差异

on:
  push:
    branches: [main]
    paths:
      - "global.ini"

  repository_dispatch:
    types: [sccl_global_ini_ready]

  workflow_dispatch:
    inputs:
      version_name:
        required: false
        type: string
      source_path:
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: global-ini-main
  cancel-in-progress: false

jobs:
  convert-compare-json:
    runs-on: ubuntu-latest
    env:
      VERSION_NAME: ${{ github.event.client_payload.version_name || inputs.version_name || '' }}
      SOURCE_PATH: ${{ github.event.client_payload.source_path || inputs.source_path || '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate event inputs
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]] && \
             { [[ -z "$VERSION_NAME" ]] || [[ -z "$SOURCE_PATH" ]]; }; then
            echo "repository_dispatch requires version_name and source_path." >&2
            exit 1
          fi

          if [[ -n "$SOURCE_PATH" && ! "$SOURCE_PATH" =~ ^worker-inbox/[^/]+\.ini$ ]]; then
            echo "Invalid source_path: $SOURCE_PATH" >&2
            exit 1
          fi

          node - <<'NODE'
          const version = process.env.VERSION_NAME;
          if (version && (/[<>:"/\\|?*\x00-\x1f]/.test(version) || /[. ]$/.test(version))) {
            throw new Error(`version_name contains invalid filename characters: ${version}`);
          }
          NODE

      - name: Sync or discard Worker input
        id: worker_sync
        if: env.SOURCE_PATH != ''
        shell: bash
        run: |
          if [[ ! -f "$SOURCE_PATH" ]]; then
            echo "Source file does not exist: $SOURCE_PATH" >&2
            exit 1
          fi

          if ! git ls-files --error-unmatch -- "$SOURCE_PATH" >/dev/null 2>&1; then
            echo "Source file is not tracked by Git: $SOURCE_PATH" >&2
            exit 1
          fi

          source_blob=$(git hash-object -- "$SOURCE_PATH")
          current_blob=$(git rev-parse HEAD:global.ini)
          decision=accepted
          should_process=true

          if [[ "$source_blob" == "$current_blob" ]]; then
            decision=duplicate_current
            should_process=false
          else
            while IFS= read -r revision; do
              historical_blob=$(git rev-parse "$revision:global.ini" 2>/dev/null || true)
              if [[ "$source_blob" == "$historical_blob" ]]; then
                decision=stale_history
                should_process=false
                break
              fi
            done < <(git log --format=%H HEAD -- global.ini)
          fi

          if [[ "$should_process" == true ]]; then
            cp -- "$SOURCE_PATH" global.ini
          else
            echo "Discarding Worker input ($decision); global.ini remains unchanged."
          fi

          rm -- "$SOURCE_PATH"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- global.ini "$SOURCE_PATH"
          if [[ "$should_process" == true ]]; then
            git commit -m "Sync global.ini for ${VERSION_NAME:-unknown version}"
          else
            git commit -m "Discard $decision Worker input for ${VERSION_NAME:-unknown version}"
          fi
          git push origin HEAD:main

          echo "should_process=$should_process" >> "$GITHUB_OUTPUT"
          echo "decision=$decision" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.worker_sync.outputs.should_process != 'false'
        run: npm install axios form-data

      - name: Generate difference and upload to ParaTranz
        id: difference
        if: steps.worker_sync.outputs.should_process != 'false'
        shell: bash
        env:
          AUTHORIZATION: ${{ secrets.AUTHORIZATION }}
        run: |
          if [[ -n "$VERSION_NAME" ]]; then
            node scripts/generate_difference.js "$VERSION_NAME"
          else
            node scripts/generate_difference.js
          fi

      - name: Upload JSON files
        if: steps.worker_sync.outputs.should_process != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: json_files_zip
          path: |
            global.json
            final.json
            ${{ steps.difference.outputs.file_name }}
